# NG-VMS Enterprise — IIS Integration Stack
# Use this if you want to use Microsoft IIS as your primary Reverse Proxy instead of Caddy.

services:
  backend:
    image: ngvms-backend:latest
    container_name: ngvms_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000" # Exposed for IIS Proxy
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-ngvms_root}:${MONGO_ROOT_PASSWORD}@mongo:27017/ngvms?replicaSet=rs0&authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-ngvms-assets}
      MINIO_USE_SSL: "false"
      SMTP_HOST: smtp_relay
      SMTP_PORT: "1025"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      LICENSE_SECRET: ${LICENSE_SECRET:-default-secret-key-123}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-default-secret-key-123}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/app/shared:ro
    networks:
      - ngvms_network

  frontend:
    image: ngvms-frontend:latest
    container_name: ngvms_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000" # Exposed for IIS Proxy
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_started
    networks:
      - ngvms_network

  mongo:
    image: mongo:6
    container_name: ngvms_mongo
    entrypoint:
      - /bin/bash
      - -c
      - |
        if [ -d /data/configdb/mongo.key ]; then
          rm -rf /data/configdb/mongo.key
        fi
        if [ ! -f /data/configdb/mongo.key ]; then
          openssl rand -base64 756 > /data/configdb/mongo.key
          chmod 400 /data/configdb/mongo.key
          chown 999:999 /data/configdb/mongo.key
        fi
        cp /data/configdb/mongo.key /tmp/mongo.key
        chmod 400 /tmp/mongo.key
        chown 999:999 /tmp/mongo.key
         exec /usr/local/bin/docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --auth --keyFile /tmp/mongo.key
    restart: unless-stopped
    networks: [ngvms_network]
    volumes:
      - mongo_data:/data/db
      - ./data/mongo:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-ngvms_root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    healthcheck:
      test: |
        echo "try { rs.status() } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }" | \
        mongosh --quiet -u ${MONGO_ROOT_USER:-ngvms_root} -p ${MONGO_ROOT_PASSWORD} --authenticationDatabase admin
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ngvms_redis
    restart: unless-stopped
    networks: [ngvms_network]
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ngvms_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data
    restart: unless-stopped
    networks: [ngvms_network]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  smtp_relay:
    image: maildev/maildev:latest
    container_name: ngvms_smtp
    restart: unless-stopped
    networks: [ngvms_network]

networks:
  ngvms_network:
    driver: bridge

volumes:
  mongo_data:
  minio_data:
  redis_data:
