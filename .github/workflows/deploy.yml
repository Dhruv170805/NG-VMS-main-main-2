name: NG-VMS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json

    - name: Install dependencies (Backend)
      run: |
        cd backend
        npm ci

    - name: Lint (Backend)
      run: |
        cd backend
        npm run lint

    - name: Install dependencies (Frontend)
      run: |
        cd frontend
        npm ci

    - name: Build (Frontend)
      run: |
        cd frontend
        npm run build

    - name: Run Backend Tests
      run: |
        cd backend
        npm run test
      env:
        MONGODB_URI: mongodb://localhost:27017/ng-vms-test-visitor
        REDIS_URL: redis://localhost:6379

    - name: Start Backend in Background
      run: |
        cd backend
        PORT=5000 MONGODB_URI=mongodb://localhost:27017/ngvms REDIS_URL=redis://localhost:6379 JWT_SECRET=test-jwt-secret-key-123456 LICENSE_SECRET=test-license-secret-key-123456 ENCRYPTION_KEY=test-encryption-key-123456 npm run dev &
        npx wait-on http://localhost:5000/health --timeout 60000

    - name: Install Playwright Browsers
      run: |
        cd frontend
        npx playwright install --with-deps chromium

    - name: Run E2E Tests (Frontend)
      run: |
        cd frontend
        npx playwright test
        
  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Backend Image
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        push: false # Set to true when registry is configured
        tags: ngvms-backend:latest
        
    - name: Build Frontend Image
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        push: false # Set to true when registry is configured
        tags: ngvms-frontend:latest
