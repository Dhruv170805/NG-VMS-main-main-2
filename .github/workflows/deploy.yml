name: NG-VMS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json

    - name: Install dependencies (Backend)
      run: |
        cd backend
        npm ci

    - name: Lint (Backend)
      run: |
        cd backend
        npm run lint

    - name: Install dependencies (Frontend)
      run: |
        cd frontend
        npm ci

    - name: Build (Frontend)
      run: |
        cd frontend
        npm run build
        # Next.js standalone needs public/ and .next/static/ copied manually
        cp -r public .next/standalone/public
        cp -r .next/static .next/standalone/.next/static
      env:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
        NEXT_PUBLIC_SOCKET_URL: http://localhost:5000

    - name: Run Backend Tests
      run: |
        cd backend
        npm run test
      env:
        MONGODB_URI: mongodb://localhost:27017/ng-vms-test-visitor
        REDIS_URL: redis://localhost:6379

    - name: Install wait-on
      run: npm install -g wait-on

    - name: Start Backend in Background
      run: |
        cd backend
        PORT=5000 \
        MONGODB_URI=mongodb://localhost:27017/ngvms \
        REDIS_URL=redis://localhost:6379 \
        JWT_SECRET=test-jwt-secret-key-123456 \
        LICENSE_SECRET=test-license-secret-key-123456 \
        ENCRYPTION_KEY=test-encryption-key-123456 \
        SKIP_HW_LOCK=true \
        DISABLE_RATE_LIMITS=true \
        npm run dev &
        wait-on http://localhost:5000/health --timeout 60000

    - name: Seed Database
      run: |
        cd backend
        MONGODB_URI=mongodb://localhost:27017/ngvms npx ts-node src/seed.ts
      env:
        MONGODB_URI: mongodb://localhost:27017/ngvms

    - name: Install Playwright Browsers
      run: |
        cd frontend
        npx playwright install --with-deps chromium

    - name: Run Smoke & A11y Tests (no backend needed)
      run: |
        cd frontend
        npx playwright test tests/e2e/smoke.spec.ts tests/a11y/
      env:
        PLAYWRIGHT_BASE_URL: http://localhost:3000
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
        NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
        CI: true

    - name: Run E2E Tests (requires backend)
      run: |
        cd frontend
        npx playwright test tests/e2e/ --ignore=tests/e2e/smoke.spec.ts
      env:
        PLAYWRIGHT_BASE_URL: http://localhost:3000
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
        NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
        CI: true

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Required permissions to push to GitHub Container Registry
    permissions:
      contents: read
      packages: write

    outputs:
      backend_image: ${{ steps.lowercase.outputs.backend_image }}
      frontend_image: ${{ steps.lowercase.outputs.frontend_image }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Lowercase image names
      id: lowercase
      run: |
        echo "backend_image=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/ngvms-backend" >> $GITHUB_OUTPUT
        echo "frontend_image=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/ngvms-frontend" >> $GITHUB_OUTPUT

    - name: Extract metadata (tags, labels) for Backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.lowercase.outputs.backend_image }}
        tags: |
          type=raw,value=latest
          type=sha,prefix=,format=short

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Extract metadata (tags, labels) for Frontend
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.lowercase.outputs.frontend_image }}
        tags: |
          type=raw,value=latest
          type=sha,prefix=,format=short

    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        build-args: |
          NEXT_PUBLIC_API_URL=/api/v1
          NEXT_PUBLIC_SOCKET_URL=/
        cache-from: type=gha
        cache-to: type=gha,mode=max
